- name: Install Python tools for docker
  ansible.builtin.pip:
    name: docker==7.1.0
  tags:
    - radarr
    - arr

- name: Private Arr network
  community.docker.docker_network:
    name: "{{ arr_network_name }}"
    internal: true
    labels:
      arr: "true"
  tags:
    - radarr
    - arr

- name: Create Docker paths
  ansible.builtin.file:
    path: "{{ docker_data_dir }}{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: '0755'
  with_items:
    - radarr_config
  tags:
    - radarr
    - arr

- name: 🛑 Stop Radarr container
  community.docker.docker_container:
    name: radarr
    image: "lscr.io/linuxserver/radarr:{{ radarr_version }}"
    state: stopped
  tags:
    - radarr
    - arr

- name: 🔥 Remove Radarr container
  community.docker.docker_container:
    name: radarr
    state: absent
  tags:
    - radarr
    - arr

- name: 🎥 Create NFS mount movies
  community.docker.docker_volume:
    name: nfs-movies
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_movies_mount.type }}"
      o: "{{ vault_arr_movies_mount.opts }}"
      device: "{{ vault_arr_movies_mount.device }}"
  tags:
    - radarr
    - arr

- name: Create NFS mount downloads
  community.docker.docker_volume:
    name: arr-downloads
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_downloads_mount.type }}"
      o: "{{ vault_arr_downloads_mount.opts }}"
      device: "{{ vault_arr_downloads_mount.device }}"
  tags:
    - radarr
    - arr

- name: Recreate Radarr container
  community.docker.docker_container:
    name: radarr
    image: lscr.io/linuxserver/radarr:{{ radarr_version }}
    state: started
    restart_policy: unless-stopped
    recreate: true
    restart: true
    pull: true
    volumes:
      - /etc/localtime:/ect/localtime:ro
      - "arr-downloads:/downloads"
      - "nfs-movies:/movies"
      - "{{ docker_data_dir }}/radarr_config:/config"
    dns_search_domains: "{{ dns_domains }}"
    dns_servers: "{{ dns_servers }}"
    log_driver: "{{ docker_log_driver }}"
    log_options: "{{ docker_log_options }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr.rule: Host(`{{ radarr_app_name }}.{{ traefik_arr_domain }}`)
      traefik.http.routers.radarr.tls: "true"
      traefik.http.routers.radarr.entrypoints: websecure
      traefik.http.services.radarr.loadbalancer.server.port: "7878"
    networks_cli_compatible: false
    networks:
      - name: "{{ arr_network_name }}"
        aliases:
          - radarr.mcharryville.space
          - radarr.arr.mcharryville.space
          - radarr
      - name: traefik_proxy
        aliases:
          - radarr.mcharryville.space
          - radarr
    env:
      TZ: "America/Chicago"
      PUID: '1000'
      PGID: '1000'
      VERSION: latest
  tags:
    - radarr
    - arr
