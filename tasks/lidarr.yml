- name: Install Python tools for docker
  ansible.builtin.pip:
    name: docker==7.1.0

- name: Add lidarr to Arr network
  community.docker.docker_network:
    name: "{{ arr_network_name }}"
  tags:
    - lidarr
    - arr

- name: Create Docker paths
  ansible.builtin.file:
    path: "{{ docker_data_dir }}/{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: '0755'
  with_items:
    - downloads
    - config

- name: Create NFS mount downloads
  community.docker.docker_volume:
    name: arr-downloads
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_downloads_mount.type }}"
      o: "{{ vault_arr_downloads_mount.opts }}"
      device: "{{ vault_arr_downloads_mount.device }}"
  tags:
    - deluge
    - arr

- name: 🎥 Create NFS mount Music
  community.docker.docker_volume:
    name: nfs-music
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_music_mount.type }}"
      o: "{{ vault_arr_music_mount.opts }}"
      device: "{{ vault_arr_music_mount.device }}"
  tags:
    - radarr
    - arr


- name: Recreate lidarr container
  community.docker.docker_container:
    name: lidarr
    image: lscr.io/linuxserver/lidarr
    state: started
    restart_policy: unless-stopped
    recreate: true
    restart: true
    pull: true
    exposed_ports:
      - '8686'
    volumes:
      - "arr-downloads:/downloads"
      - "nfs-music:/music"
      - "{{ docker_lidarr_storage }}/config:/config"
    dns_search_domains: "{{ dns_domains }}"
    dns_servers: "{{ dns_servers }}"
    log_driver: "{{ docker_log_driver }}"
    log_options: "{{ docker_log_options }}"
    networks_cli_compatible: false
    networks:
      - name: theways
      - name: "{{ traefik_proxy_network }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.lidarr.rule: Host(`{{ lidarr_app_name }}.{{ traefik_arr_domain }}`)
      traefik.http.routers.lidarr.tls: "true"
      traefik.http.routers.lidarr.entrypoints: websecure
      traefik.http.services.lidarr.loadbalancer.server.port: "8686"
    env:
      TZ: "America/Chicago"
      PUID: '1000'
      PGID: '1000'
      VERSION: latest
  tags:
    - lidarr
    - arr

- name: Create Exportarr Lidarr
  community.docker.docker_container:
    name: exportarr_lidarr
    image: ghcr.io/onedr0p/exportarr:latest
    state: started
    restart_policy: unless-stopped
    recreate: true
    restart: true
    pull: true
    exposed_ports:
      - '9707'
    dns_search_domains: "{{ dns_domains }}"
    dns_servers: "{{ dns_servers }}"
    log_driver: "{{ docker_log_driver }}"
    log_options: "{{ docker_log_options }}"
    networks_cli_compatible: false
    networks:
      - name: "{{ arr_network_name }}"
        aliases:
          - lidarr.mcharryville.space
          - lidarr.arr.mcharryville.space
          - lidarr
      - name: "{{ traefik_proxy_network }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.lidarr.rule: Host(`exportarr-lidarr.{{ traefik_arr_domain }}`)
      traefik.http.routers.lidarr.tls: "true"
      traefik.http.routers.lidarr.entrypoints: websecure
      traefik.http.services.lidarr.loadbalancer.server.port: "9707"
    env:
      port: "9707"
      APIKEY: "{{ vault_exportarr_lidarr_apikey }}"
      URL: "http://lidarr:8686"

  tags:
    - lidarr
    - arr


