- name: Install Python tools for docker
  ansible.builtin.pip:
    name: docker==7.1.0
  tags:
    - sonarr
    - arr

- name: Private Arr network
  community.docker.docker_network:
    name: "{{ arr_network_name }}"
    internal: true
    labels:
      arr: "true"
  tags:
    - sonarr
    - arr

- name: Create Docker paths
  ansible.builtin.file:
    path: "{{ docker_data_dir }}{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: '0755'
  with_items:
    - sonarr_config
  tags:
    - sonarr
    - arr

- name: 🛑 Stop Sonarr container
  community.docker.docker_container:
    name: sonarr
    image: "lscr.io/linuxserver/sonarr:{{ sonarr_version }}"
    state: stopped
  tags:
    - sonarr
    - arr

- name: 🔥 Remove Sonarr container
  community.docker.docker_container:
    name: sonarr
    state: absent
  tags:
    - sonarr
    - arr

