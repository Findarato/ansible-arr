- name: 📺 Create NFS mount TV
  community.docker.docker_volume:
    name: nfs-tv
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_tv_mount.type }}"
      o: "{{ vault_arr_tv_mount.opts }}"
      device: "{{ vault_arr_tv_mount.device }}"
  tags:
    - sonarr
    - arr

- name: Remove NFS mount downloads
  community.docker.docker_volume:
    name: arr-downloads
    state: absent
    driver: local
  tags:
    - sonarr
    - arr

- name: Create NFS mount downloads
  community.docker.docker_volume:
    name: arr-downloads
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_downloads_mount.type }}"
      o: "{{ vault_arr_downloads_mount.opts }}"
      device: "{{ vault_arr_downloads_mount.device }}"
  tags:
    - sonarr
    - arr

- name: Recreate Sonarr container
  community.docker.docker_container:
    name: "{{ sonarr_app_name }}"
    image: "lscr.io/linuxserver/sonarr:{{ sonarr_version }}"
    state: started
    restart_policy: "{{ docker_restart_condition }}"
    recreate: true
    restart: true
    pull: true
    volumes:
      - /etc/localtime:/ect/localtime:ro
      - "arr-downloads:/downloads"
      - "nfs-tv:/tv"
      - "{{ docker_data_dir }}/sonarr_config:/config"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr.rule: Host(`{{ sonarr_app_name }}.{{ traefik_arr_domain }}`)
      traefik.http.routers.sonarr.tls: "true"
      traefik.http.routers.sonarr.entrypoints: websecure
      traefik.http.services.sonarr.loadbalancer.server.port: "8989"
    dns_search_domains: "{{ dns_domains }}"
    dns_servers: "{{ dns_servers }}"
    log_driver: "{{ docker_log_driver }}"
    log_options: "{{ docker_log_options }}"
    networks_cli_compatible: false
    networks:
      - name: "{{ arr_network_name }}"
        aliases:
          - sonarr.mcharryville.space
          - sonarr.arr.mcharryville.space
          - sonarr
      - name: traefik_proxy
        aliases:
          - sonarr.mcharryville.space
    env:
      TZ: "America/Chicago"
      PUID: '1000'
      PGID: '1000'
      VERSION: latest
  tags:
    - sonarr
    - arr
