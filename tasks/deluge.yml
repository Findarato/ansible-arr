- name: Install Python tools for docker
  ansible.builtin.pip:
    name: docker==7.1.0
  tags:
    - deluge
    - arr

- name: Private Arr network
  community.docker.docker_network:
    name: "{{ arr_network_name }}"
    internal: true
    labels:
      arr: "true"
  tags:
    - deluge
    - arr

- name: 'Create directory for container data'
  ansible.builtin.file:
    path: "{{ docker_data_dir }}/{{ dir }}"
    state: directory
    owner: docker
    group: docker
    mode: '0755'
  loop:
    - 'deluge_data'
    - 'deluge_config'
  loop_control:
    loop_var: 'dir'
  tags:
    - deluge
    - arr

- name: Create NFS mount downloads
  community.docker.docker_volume:
    name: arr-downloads
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_downloads_mount.type }}"
      o: "{{ vault_arr_downloads_mount.opts }}"
      device: "{{ vault_arr_downloads_mount.device }}"
  tags:
    - deluge
    - arr


- name: Create and Update Deluge Container
  community.docker.docker_container:
    name: deluge
    image: "lscr.io/linuxserver/deluge:{{ deluge_version }}"
    state: started
    restart_policy: unless-stopped
    recreate: true
    restart: true
    pull: true
    container_default_behavior: no_defaults
    volumes:
      - arr-downloads:/downloads
      - "{{ docker_data_dir }}/deluge_config:/config"
    labels:
      traefik.enable: "true"
      traefik.http.routers.deluge.rule: Host(`{{ deluge_app_name }}.{{ traefik_arr_domain }}`)
      traefik.http.routers.deluge.tls: "true"
      traefik.http.routers.deluge.entrypoints: websecure
      traefik.http.services.deluge.loadbalancer.server.port: "8112"
    env:
      PGID: "1000002" # docker user
      PUID: "1000"
      TZ: "America/Chicago"
      DELUGE_LOGLEVEL: error
    log_driver: "{{ docker_log_driver }}"
    log_options: "{{ docker_log_options }}"
    networks:
      - name: "{{ arr_network_name }}"
        aliases:
          - deluge.mcharryville.space
          - deluge.arr.mcharryville.space
          - deluge
      - name: traefik_proxy
        aliases:
          - deluge.mcharryville.space
  tags:
    - deluge
    - arr
