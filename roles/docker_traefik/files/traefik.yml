api:
  dashboard: true
  debug: true
  insecure: true

# log:
#   level: DEBUG


metrics:
  addInternals: true
  prometheus:
    addEntryPointsLabels: true
    entryPoint: metrics
    # entryPoint: metrics
# accesslog: true
sendAnonymousUsage: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
    observability:
      accessLogs: false
      metrics: false
      tracing: false
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.mcharryville.space"
            sans:
              - "*.arr.mcharryville.space"
  deluge-tcp:
    address: ":58846/tcp"
  metrics:
    address: :8082

tls:
  stores:
    default:
      defaultCertificate:
        certFile = "/certs/traefik.crt"
        keyFile = "/certs/traefik.key"

ping:
  entryPoint: websecure

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    watch: true
    exposedByDefault: false
    network: traefik_proxy
  file:
    directory: /dynamic_config/
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      email: findarato@gmail.com
      storage: /certs/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory # prod (default)
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory # staging
      dnsChallenge:
        provider: cloudflare
        disablePropagationCheck: true 
        delayBeforeCheck: 60s 
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"