- name: ūüŹī‚Äć‚ė†ÔłŹ Create and Update gluetun Container
  community.docker.docker_container:
    name: gluetun
    image: "qmcgaw/gluetun:{{ docker_gluetun_vars.gluetun_release }}"
    hostname: gluetun
    state: started
    restart_policy: "{{ docker_gluetun_vars.docker_restart_condition }}"
    env:
      TZ: America/Chicago
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: "{{ docker_gluetun_vars.private_key }}"
      WIREGUARD_ADDRESSES: "{{ docker_gluetun_vars.addresses }}"
      SERVER_COUNTRIES: "{{ docker_gluetun_vars.countries }}"
      SERVER_CITIES: "{{ docker_gluetun_vars.cities }}"
      HEALTH_RESTART_VPN: "on"
      HEALTH_ICMP_TARGET_IPS: "1.1.1.1,8.8.8.8"
      HEALTH_TARGET_ADDRESSES: "cloudflare.com:443,github.com:443"
    volumes:
      - /etc/localtime:/ect/localtime:ro
      - /dev/net/tun:/dev/net/tun
    # networks:
    #   - name: "{{ traefik_proxy_network }}" # Connect to traefik for routing
    #     gw_priority: 10
    labels:
      traefik.enable: "true"
      traefik.http.routers.deluge.rule: Host(`{{ deluge_app_name }}.{{ traefik_domain }}`)
      traefik.http.routers.deluge.tls: "true"
      traefik.http.routers.deluge.entrypoints: websecure
      traefik.http.services.deluge.loadbalancer.server.port: "8112"
      traefik.tcp.services.deluge-tcp.loadbalancer.server.port: "58846"
    capabilities:
      - NET_ADMIN
  tags:
    - gluetun
    - arr
    - vpn
